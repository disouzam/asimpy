site_name: asimpy
docs_dir: pages
site_dir: docs

theme:
  name: material

nav:
  - index.md
  - license.md
  - conduct.md
  - contributing.md
  - examples.md
  - Tutorial:
    - tutorial/01_minimal.md
    - tutorial/02_queue.md
    - tutorial/03_interrupt.md
    - tutorial/04_combine.md
  - Reference:
    - reference/allof.md
    - reference/barrier.md
    - reference/environment.md
    - reference/event.md
    - reference/firstof.md
    - reference/interrupt.md
    - reference/preemptive.md
    - reference/process.md
    - reference/resource.md
    - reference/simqueue.md
    - reference/timeout.md
  - Scenarios:
    - scenarios/01_basic_ideas.md
    - scenarios/02_queue_formation.md
    - scenarios/03_littles_law.md
    - scenarios/04_sojourn_time.md
    - scenarios/05_mm1_nonlinearity.md
    - scenarios/06_pooled_vs_separate.md
    - scenarios/07_late_merge.md
    - scenarios/08_inspectors_paradox.md
    - scenarios/09_convoy_effect.md
    - scenarios/10_priority_starvation.md
    - scenarios/11_tandem_queue.md
    - scenarios/12_rush_hour.md
    - scenarios/13_braess_paradox.md

plugins:
- mkdocstrings:
    handlers:
      python:
        paths:
          - src

markdown_extensions:
- markdown_include.include:
    base_path: docs
- pymdownx.arithmatex:
    generic: true
- pymdownx.highlight
- pymdownx.superfences

extra_javascript:
- js/mathjax.js
- https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

exclude_docs: >
  *~
